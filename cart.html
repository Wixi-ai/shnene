<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ШНЕЙНЕ ГОША | Корзина</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">ШНЕЙНЕ ГОША</a>
      <ul class="nav-links">
        <li><a href="index.html">Каталог</a></li>
        <li><a href="index.html#about">О бренде</a></li>
        <li><a href="index.html#contact">Контакты</a></li>
      </ul>
      <a href="cart.html" class="cart-btn">
        🛒 Корзина <span class="cart-count">0</span>
      </a>
    </div>
  </nav>

  <div class="container cart-page">
    <h1 class="cart-title">Корзина</h1>
    <div class="cart-content" id="cart-content"></div>
  </div>

  <!-- Модальное окно оформления заказа -->
  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Оформление заказа</h2>
      <form id="orderForm" action="https://formspree.io/f/xlgowjpy" method="POST">
        <input type="hidden" name="_subject" value="Новый заказ из магазина ШНЕЙНЕ ГОША">
        <input type="hidden" name="_replyto" id="customerEmail">
        <div class="form-group">
          <label>Ваше имя *</label>
          <input type="text" name="name" required placeholder="Иван Иванов">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" required placeholder="ivan@example.com" id="orderEmail">
        </div>
        <div class="form-group">
          <label>Телефон *</label>
          <input type="tel" name="phone" required placeholder="+7 (999) 123-45-67">
        </div>
        <div class="form-group">
          <label>Адрес доставки *</label>
          <textarea name="address" required rows="3" placeholder="Город, улица, дом, квартира"></textarea>
        </div>
        <div class="form-group">
          <label>Комментарий к заказу</label>
          <textarea name="comment" rows="2" placeholder="Дополнительные пожелания..."></textarea>
        </div>
        <input type="hidden" name="order_details" id="orderDetails">
        <input type="hidden" name="total_amount" id="totalAmount">
        <button type="submit" class="btn">Подтвердить заказ</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2024 ШНЕЙНЕ ГОША. Все права защищены.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
